<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Prompt Logger{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <a href="{{ url_for('prompts.index') }}" class="nav-logo">⚡ Prompt Logger</a>
    <div class="nav-links">
        <a href="{{ url_for('prompts.index') }}">Всі промпти</a>
        <a href="{{ url_for('prompts.create') }}">+ Новий промпт</a>
    </div>
</nav>

<main class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</main>

<footer class="footer">
    <p>Prompt Logger © 2024</p>
</footer>

</body>
</html>
