{% extends 'base.html' %}

{% block title %}Новий промпт — Prompt Logger{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Новий промпт</h1>
    <a href="{{ url_for('prompts.index') }}" class="btn btn-secondary">← Назад</a>
</div>

<div class="form-card">
    <form action="{{ url_for('prompts.create_post') }}" method="POST">

        <div class="form-group">
            <label for="title">Назва *</label>
            <input type="text" id="title" name="title"
                   placeholder="Наприклад: Summarize article"
                   required>
        </div>

        <div class="form-group">
            <label for="category">Категорія</label>
            <input type="text" id="category" name="category"
                   placeholder="Наприклад: Writing, Coding, Analysis">
        </div>

        <div class="form-group">
            <label for="description">Опис</label>
            <input type="text" id="description" name="description"
                   placeholder="Коротко про що цей промпт">
        </div>

        <div class="form-group">
            <label for="content">Зміст промпту *</label>
            <textarea id="content" name="content" rows="10"
                      placeholder="Введи текст промпту..."
                      required></textarea>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Зберегти промпт</button>
            <a href="{{ url_for('prompts.index') }}" class="btn btn-secondary">Скасувати</a>
        </div>

    </form>
</div>

{% endblock %}
