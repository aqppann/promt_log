{% extends 'base.html' %}

{% block title %}Редагування — {{ prompt.title }} — Prompt Logger{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Редагування промпту</h1>
    <a href="{{ url_for('prompts.detail', prompt_id=prompt.id) }}" class="btn btn-secondary">← Назад</a>
</div>

<div class="form-card">
    <form action="{{ url_for('prompts.edit_post', prompt_id=prompt.id) }}" method="POST">

        <div class="form-group">
            <label for="title">Назва *</label>
            <input type="text" id="title" name="title"
                   value="{{ prompt.title }}"
                   required>
        </div>

        <div class="form-group">
            <label for="category">Категорія</label>
            <input type="text" id="category" name="category"
                   value="{{ prompt.category or '' }}"
                   placeholder="Наприклад: Writing, Coding, Analysis">
        </div>

        <div class="form-group">
            <label for="description">Опис</label>
            <input type="text" id="description" name="description"
                   value="{{ prompt.description or '' }}"
                   placeholder="Коротко про що цей промпт">
        </div>

        <div class="form-group">
            <label for="content">Зміст промпту *</label>
            <textarea id="content" name="content" rows="10"
                      required>{{ prompt.content }}</textarea>
        </div>

        <div class="form-hint">
            💡 При збереженні поточна версія автоматично збережеться в історії.
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Зберегти зміни</button>
            <a href="{{ url_for('prompts.detail', prompt_id=prompt.id) }}" class="btn btn-secondary">Скасувати</a>
        </div>

    </form>
</div>

{% endblock %}
