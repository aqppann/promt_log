{% extends 'base.html' %}

{% block title %}Всі промпти — Prompt Logger{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Мої промпти</h1>
    <a href="{{ url_for('prompts.create') }}" class="btn btn-primary">+ Новий промпт</a>
</div>

{% if prompts %}
    <div class="prompts-grid">
        {% for prompt in prompts %}
        <div class="prompt-card">
            <div class="prompt-card-header">
                <h2>
                    <a href="{{ url_for('prompts.detail', prompt_id=prompt.id) }}">
                        {{ prompt.title }}
                    </a>
                </h2>
                {% if prompt.category %}
                    <span class="badge">{{ prompt.category }}</span>
                {% endif %}
            </div>
